ja = "ボード上で操作するには、コントロールキー（Ctrl）またはコマンドキー（⌘）を押しながら、文字と数字を順番に入力するか、あるいはその逆の順番で入力します。"
ko = "키보드에서 Control(Ctrl) 키 또는 Command(⌘) 키를 누른 상태에서 글자 키와 숫자 키를 순서대로 누르거나, 숫자 키와 글자 키를 순서대로 누르면 보드에서 게임을 진행할 수 있습니다."
