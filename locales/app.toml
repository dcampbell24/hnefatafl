["You can play on the board by pressing control (Ctrl) or command (⌘) and a letter then a number or vice versa."]
ar = "يمكنك اللعب على اللوحة بالضغط على مفتاح التحكم (Ctrl) أو مفتاح الأوامر (⌘) وحرف ثم رقم أو العكس."
