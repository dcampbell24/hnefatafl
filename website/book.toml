[book]
title = "Copenhagen Hnefatafl"
description = "{{description}}"
authors = [
    "David Lawrence Campbell",
]
language = "en"

[rust]
edition = "2024"

[output.html]
git-repository-url = "https://github.com/dcampbell24/hnefatafl"
mathjax-support = true
input-404 = "404.md"

[output.html.playground]
editable = true
line-numbers = true

[output.html.search]
limit-results = 20
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = true
heading-split-level = 2

[preprocessor.embedify]
footer.enable = true
footer.message = "<p>Copyright © 2026 <a href=https://dlc.name>David Lawrence Campbell</a></p> <script type='text/javascript' src='https://storage.ko-fi.com/cdn/widget/Widget_2.js'></script><script type='text/javascript'>kofiwidget2.init('Support DLC on Ko-fi', '#72a4f2', 'dcampbell24');kofiwidget2.draw();</script>"
