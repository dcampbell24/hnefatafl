on: [push, pull_request]
name: All of the Rust Commit Checks

# Make sure CI fails on all warnings, including Clippy lints
env:
  RUSTFLAGS: "-D warnings"

permissions:
  actions: read # An explanation.

jobs:
  rust_checks:
    name: Rust Checks
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}

    permissions:
      security-events: write # An explanation.
      actions: read # An explanation.

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run clippy
        run: |
          sudo apt-get update
          sudo apt-get install libasound2-dev mold

          rustup component add clippy rustfmt
          rustup update stable

          cargo fmt --all --check
          cargo clippy --examples --features js
          cargo test --features js
          cargo test --benches --features js
